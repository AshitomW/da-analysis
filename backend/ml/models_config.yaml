dataset: cleaned

# Dynamic targets exclusion
targets:
  exclude:
    - entry_id
    - title
    - abstract_summary
    - keywords
    - language
    - dataset_used
    - publication_venue
    - model_performance_metric
    - model_performance_value
    - month
    - quarter
    - organization

models:
  Linear Regression:
    enabled: true
    params:
      fit_intercept: true
      
  Ridge Regression:
    enabled: false
    params:
      alpha: 1.0
    tuning_grid:
      alpha: [0.1, 1.0, 10.0]

  Decision Tree:
    enabled: false
    params:
      max_depth: 8
      random_state: 42
    tuning_grid:
      max_depth: [6, 10, 14]

  Random Forest:
    enabled: true
    params:
      n_estimators: 100
      max_depth: 10
      min_samples_leaf: 4
      random_state: 42
    tuning_grid:
      n_estimators: [50, 100, 150]
      max_depth: [8, 12, 16]
      min_samples_leaf: [2, 4]

  Gradient Boosting:
    enabled: true
    params:
      n_estimators: 100
      max_depth: 4
      learning_rate: 0.1
      random_state: 42
    tuning_grid:
      n_estimators: [50, 100, 150]
      max_depth: [3, 5, 8]
      learning_rate: [0.05, 0.1, 0.2]

  XGBoost:
    enabled: true
    params:
      n_estimators: 100
      max_depth: 4
      learning_rate: 0.1
      random_state: 42
      n_jobs: -1
    tuning_grid:
      n_estimators: [50, 100, 150]
      max_depth: [3, 5, 8]
      learning_rate: [0.05, 0.1, 0.2]

  Neural Network:
    enabled: false
    params:
      hidden_layer_sizes: [64, 32]
      max_iter: 150
      learning_rate_init: 0.01
      early_stopping: true
      random_state: 42
    tuning_grid:
      hidden_layer_sizes: [[64, 32], [128, 64]]
      learning_rate_init: [0.005, 0.01, 0.02]

  Ensemble (Voting):
    enabled: true
    params: {}

  K-Means Clustering:
    enabled: false
    params:
      n_clusters: 3
